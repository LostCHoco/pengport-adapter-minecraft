# 별도 repo 로 분리 시 활성. 본가 워크스페이스에 있을 때는 본가 CI 가 통합 실행.
#
# - cargo build / test
# - Docker 이미지 빌드 + (master push 시) GHCR push
#
# 시크릿 (별도 repo 분리 후 사용자가 GitHub 에서 등록):
#   - GHCR_TOKEN (선택, master push 시 ghcr.io push 용)

name: CI

on:
  push:
    branches: [master, main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo test --release
      - run: cargo build --release

  docker:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pengport-adapter-minecraft:latest
            ghcr.io/${{ github.repository_owner }}/pengport-adapter-minecraft:${{ github.sha }}
